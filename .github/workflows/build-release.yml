name: Build and Release

# push/tag: normal CI. workflow_dispatch: same jobs for the selected branch (e.g. main) without a push.
on:
  push:
    branches: [main]
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.21"
          cache-dependency-path: go.sum

      - name: Test
        run: go test ./... -count=1 -timeout=60s

      - name: Build all targets
        run: |
          TARGETS="linux/amd64 linux/arm64 darwin/amd64 darwin/arm64 freebsd/amd64 freebsd/arm64 openbsd/amd64 openbsd/arm64 netbsd/amd64 netbsd/arm64"
          mkdir -p dist
          for t in $TARGETS; do
            GOOS="${t%%/*}"
            GOARCH="${t##*/}"
            OUT="dist/git-builder-${GOOS}-${GOARCH}"
            echo "Building $GOOS/$GOARCH"
            GOOS="$GOOS" GOARCH="$GOARCH" go build -o "$OUT" . && echo "$OUT" >> dist/.built || true
          done
          if [ ! -s dist/.built ]; then
            echo "No artifacts built"
            exit 1
          fi

      - name: Release (versioned tag)
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG=${GITHUB_REF#refs/tags/}
          gh release create "$TAG" $(cat dist/.built) --generate-notes

      - name: Release (latest from main)
        if: github.ref == 'refs/heads/main'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -f latest
          git push -f origin latest
          gh release delete latest --yes 2>/dev/null || true
          gh release create latest $(cat dist/.built) --notes "Latest from main (${GITHUB_SHA})"
