# git-builder config (YAML only). Default path: /etc/git-builder/config.yaml

poll_interval_seconds: 60
workdir: /var/lib/git-builder/repos
ssh_key: id_ed25519

# HTTPS clone/pull (optional). Fine-grained token Contents: Read.
# github_token: <token>

# Script env: ghcr_token or GHCR_TOKEN set GHCR_TOKEN; ghcr_user used for docker login ghcr.io.
# ghcr_token: <token>
# ghcr_user: Leopere
# script_env: { }

max_concurrent: 4
# local_override_dir: /etc/git-builder/local-overrides

repos:
  - url: "https://github.com/OWNER/repo.git"
  # - url: "git@github.com:OWNER/repo.git"
