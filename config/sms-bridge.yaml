# git-builder: SSH target smsbridge.taylor-co.com (Host sms-bridge in ~/.ssh/config).
# Alternative clone URL (HTTPS + github_token in config): https://github.com/Leopere/taylor-co-smsbridge.git

poll_interval_seconds: 60
workdir: /var/lib/git-builder/repos
ssh_key: id_ed25519_taylor_smsbridge
max_concurrent: 4

repos:
  - url: "git@github.com:Leopere/taylor-co-smsbridge.git"
